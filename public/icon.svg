<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <filter id="neo-shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="32" dy="32" stdDeviation="0" flood-color="#000000" flood-opacity="1" />
    </filter>
  </defs>

  <!-- Green rounded card with thick black border and pixel-perfect hard shadow -->
  <rect x="56" y="56" width="368" height="368" rx="80" fill="#10b981" stroke="#000000" stroke-width="32" filter="url(#neo-shadow)" />

  <!-- Crisp White Checkmark -->
  <path d="M150 235 L225 310 L330 175" fill="none" stroke="#ffffff" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" />
</svg>
